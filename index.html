<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JXM — Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #000000;
      --carpathian-forest: #202020;
      --white: #FFFFFF;
      --almost-white: #F3F3F3;
      --kermit: #49E385;
      --blurple: #5E4FF5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--carpathian-forest);
      color: var(--white);
      font-family: 'Open Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }

    /* JXM Logo SVG */
    .logo {
      width: 160px;
    }

    /* Main heading */
    h1 {
      font-family: 'Anton', sans-serif;
      font-weight: 400;
      text-transform: uppercase;
      font-size: clamp(2.5rem, 8vw, 5rem);
      letter-spacing: 0.02em;
      line-height: 1;
      text-align: center;
    }

    h1 span {
      color: var(--kermit);
    }

    /* Footer caption */
    footer {
      font-family: 'Open Sans', sans-serif;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.7rem;
      color: var(--almost-white);
      opacity: 0.5;
      position: absolute;
      bottom: 32px;
    }
  </style>
</head>
<body>

 

  <h1>THIS IS A <span>TEST</span></h1>

  <footer>© MMXXVI JXM | ALL RIGHTS RESERVED</footer>

</body>
</html>
